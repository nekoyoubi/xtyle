name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: rm -f package-lock.json && npm install
      - run: npm run build

      # Resolution from a packed tarball cannot be proven from inside the repo: `algorithms/` sits at
      # the root, so the resolver's walk-up finds it whether or not the published package would.
      - name: check packaged resolution
        run: npm run check:packaging

      # Published in dependency order, and a failure stops the ones downstream of it: svelte and astro
      # both depend on core, so publishing them over a core that never landed ships packages nobody can
      # install, and a public registry has no clean undo. `publish-workspace.mjs` still tolerates the
      # case the old `continue-on-error: true` was there for — a re-run after a partial release, where a
      # package is already on the registry at this version — without swallowing real failures too.
      - name: publish core
        run: node scripts/publish-workspace.mjs packages/xtyle

      - name: publish svelte
        run: node scripts/publish-workspace.mjs packages/svelte

      - name: publish astro
        run: node scripts/publish-workspace.mjs packages/astro
