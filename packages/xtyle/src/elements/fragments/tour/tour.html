<div class="xtyle-tour" part="tour" data-root hidden>
	<xtyle-spotlight class="xtyle-tour__spotlight" part="spotlight" no-close-button data-tour-spotlight>
		<div class="xtyle-tour__body" part="body"><slot></slot></div>
		<div class="xtyle-tour__nav" part="nav" slot="actions">
			<button class="xtyle-tour__back" part="back" type="button" data-tour-back hidden>Back</button>
			<span class="xtyle-tour__progress" part="progress" data-tour-progress aria-hidden="true" hidden></span>
			<button class="xtyle-tour__skip" part="skip" type="button" data-tour-skip>Skip</button>
			<button class="xtyle-tour__next" part="next" type="button" data-tour-next>Next</button>
		</div>
	</xtyle-spotlight>
</div>
