<div class="xtyle-command-palette" part="palette" data-root>
	<dialog class="xtyle-command-palette__dialog" part="dialog" data-modal>
		<div class="xtyle-command-palette__search" part="search" data-search>
			<span class="xtyle-command-palette__glyph" part="glyph" aria-hidden="true" data-glyph></span>
			<input class="xtyle-command-palette__input" part="input" data-input type="text" role="combobox" aria-autocomplete="list" aria-expanded="false" autocomplete="off" spellcheck="false" />
		</div>
		<div class="xtyle-command-palette__results" part="results" data-results>
			<div class="xtyle-command-palette__list" part="list" role="listbox" data-list></div>
			<p class="xtyle-command-palette__empty" part="empty" data-empty hidden></p>
		</div>
		<footer class="xtyle-command-palette__footer" part="footer" data-footer hidden></footer>
	</dialog>
</div>
