<div class="xtyle-dropzone__body" part="root" data-root>
	<label class="xtyle-dropzone__surface" part="surface" data-surface>
		<span class="xtyle-dropzone__icon" part="icon" aria-hidden="true" data-glyph></span>
		<span class="xtyle-dropzone__prompt" part="prompt" data-slot data-prompt><slot><span data-slot-fallback data-prompt-text></span></slot></span>
		<span class="xtyle-dropzone__hint" part="hint" data-hint></span>
		<span class="xtyle-dropzone__browse" part="browse" aria-hidden="true" data-browse></span>
	</label>
	<ul class="xtyle-dropzone__errors" part="errors" role="alert" data-errors hidden></ul>
	<ul class="xtyle-dropzone__list" part="list" aria-live="polite" data-list hidden></ul>
	<div class="xtyle-dropzone__foot" part="foot" data-foot hidden></div>
</div>
