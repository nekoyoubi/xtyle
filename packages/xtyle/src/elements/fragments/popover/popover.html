<span class="xtyle-popover" part="popover" data-root>
	<span class="xtyle-popover__trigger" part="trigger" data-trigger data-slot="trigger"><slot name="trigger"></slot></span>
	<dialog class="xtyle-popover__panel" part="panel" popover tabindex="-1" data-surface>
		<span class="xtyle-popover__arrow" part="arrow" aria-hidden="true" data-arrow></span>
		<div class="xtyle-popover__content" part="content" data-content data-slot><slot></slot></div>
	</dialog>
</span>
